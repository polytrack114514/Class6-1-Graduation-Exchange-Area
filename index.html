<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六(1)班毕业交流区</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(20, 20, 25, 0.75);
            --surface-hover: rgba(30, 30, 38, 0.85);
            --text-primary: #f0f0f5;
            --text-secondary: #888899;
            --text-muted: #555566;
            --accent: #e8e8f0;
            --accent-hover: #ffffff;
            --border: rgba(255, 255, 255, 0.06);
            --border-focus: rgba(255, 255, 255, 0.15);
            --danger: #ff5555;
            --gold: #ffd700;
            --gold-hover: #ffe44d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 0;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.0);
            z-index: 1;
        }

        .header {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 60px 20px 30px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 720px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: var(--surface);
            border-radius: 14px;
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.25s ease;
            font-family: inherit;
            letter-spacing: 0.01em;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .tab .icon {
            margin-right: 6px;
        }

        .fab-post {
            padding: 12px 28px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 14px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fab-post:hover {
            background: var(--gold-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(255, 215, 0, 0.25);
        }

        .fab-post:active {
            transform: translateY(0);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            animation: overlayIn 0.25s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes overlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: #1a1a24;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 36px 32px 32px;
            width: 90%;
            max-width: 480px;
            position: relative;
            animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .modal-close:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .modal-title {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 28px;
            color: var(--text-primary);
        }

        .modal-input {
            width: 100%;
            padding: 14px 18px;
            background: #22222e;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.25s;
            margin-bottom: 16px;
        }

        .modal-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .modal-input::placeholder {
            color: var(--text-muted);
        }

        .modal-textarea {
            width: 100%;
            min-height: 140px;
            padding: 14px 18px;
            background: #22222e;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            resize: vertical;
            transition: all 0.25s;
            line-height: 1.6;
        }

        .modal-textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .modal-textarea::placeholder {
            color: var(--text-muted);
        }

        .modal-submit {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            margin-top: 20px;
        }

        .modal-submit:hover {
            background: var(--gold-hover);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
        }

        .modal-submit:active {
            transform: scale(0.98);
        }

        .modal-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .posts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .post-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-card:hover {
            background: var(--surface-hover);
            border-color: var(--border-focus);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
            gap: 10px;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            min-width: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            border: 1px solid var(--border);
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .author-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
            flex: 1;
        }

        .author-name {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-word;
            line-height: 1.4;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
        }

        .post-time {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .post-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .post-content {
            color: rgba(240, 240, 245, 0.85);
            line-height: 1.75;
            font-size: 0.95rem;
            margin-bottom: 18px;
            white-space: pre-wrap;
            word-break: break-word;
            font-weight: 400;
        }



        .pin-btn {
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: rgba(255, 215, 0, 0.8);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s ease;
            white-space: nowrap;
            margin-right: 4px;
        }

        .post-card:hover .pin-btn {
            opacity: 1;
        }

        .pin-btn:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.6);
            color: #ffd700;
        }

        .post-card:has(.pinned) {
            border-color: rgba(255, 215, 0, 0.3);
        }

        
        /* 图片上传 */
        .image-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }
        .image-input {
            flex: 1;
            padding: 10px 14px;
            background: #22222e;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.88rem;
            font-family: inherit;
            outline: none;
        }
        .image-input:focus {
            border-color: var(--border-focus);
        }
        .image-input::placeholder {
            color: var(--text-muted);
        }
        .post-images {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .post-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            border: 1px solid var(--border);
            object-fit: cover;
        }

        .anon-checkbox input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--gold);
        }

        @media (max-width: 600px) {
            .pin-btn {
                opacity: 1;
            }
        }

        .delete-btn {
            background: transparent;
            border: 1px solid rgba(255, 100, 100, 0.3);

            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;

        }

        .post-card:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: rgba(255, 80, 80, 0.15);
            border-color: rgba(255, 100, 100, 0.6);
            color: rgba(255, 150, 150, 1);
        }

        }

        .badge {
            display: inline-block;
            padding: 1px 6px;
            font-size: 10px;
            font-weight: 700;
            border-radius: 4px;
            margin-left: 4px;
            vertical-align: middle;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-developer {
            background: linear-gradient(90deg, #0a0a1a, #1a1a3a, #0a0a1a);
            color: #00eaff;
            border: 1px solid #00eaff;
            box-shadow: 0 0 8px rgba(0, 234, 255, 0.4), inset 0 0 4px rgba(0, 234, 255, 0.1);
            text-shadow: 0 0 4px rgba(0, 234, 255, 0.8);
            font-family: 'Courier New', monospace;
            position: relative;
            overflow: hidden;
        }

        .badge-developer::before {
            content: '</>';
            font-size: 9px;
            margin-right: 2px;
            opacity: 0.9;
        }

        .badge-admin {
            background: linear-gradient(135deg, #ffd700, #ffb800, #ffd700);
            color: #3d2800;
            border: 1px solid #ffd700;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.3);
            font-family: 'Georgia', serif;
        }

        .badge-admin::before {
            content: '👑';
            font-size: 10px;
            margin-right: 2px;
        }

        .post-footer {
            display: flex;
            gap: 24px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.84rem;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .action-btn:hover {
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.04);
        }

        .action-btn.liked {
            color: #ff6b6b;
        }

        .action-btn.liked:hover {
            background: rgba(255, 107, 107, 0.08);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state .emoji {
            font-size: 3.5rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* 加载提示 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* 评论区 */
        .comments-section {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .comments-section.show {
            display: block;
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
            max-height: 300px;
            overflow-y: auto;
        }

        .comment-item {
            display: flex;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            justify-content: space-between;
        }

        .comment-avatar {
            width: 28px;
            height: 28px;
            min-width: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }

        .comment-body {
            flex: 1;
            min-width: 0;
        }

        .comment-author {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }

        .comment-text {
            font-size: 0.88rem;
            color: rgba(240, 240, 245, 0.75);
            line-height: 1.6;
            word-break: break-word;
        }

        .comment-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .comment-input-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .comment-input-row {
            display: flex;
            gap: 8px;
        }

        .comment-input {
            flex: 1;

        }

        .comment-submit:hover {
            background: var(--gold-hover);
        }

        .comment-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .comments-toggle-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.84rem;

        }

        .comments-toggle-btn:hover {
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.04);
        }

        .comments-toggle-btn.active {
            color: var(--accent-light);

        }
        .image-input::placeholder {
            color: var(--text-muted);
        }
        .post-images {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .post-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            border: 1px solid var(--border);
            object-fit: cover;
        }

        /* 匿名选项 */
        .anon-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .anon-checkbox input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--gold);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.2rem;
            }
            .container {
                padding: 0 14px 40px;
            }
            .modal {
                padding: 28px 24px 24px;
                border-radius: 20px;
            }
            .post-card {
                padding: 18px;
                border-radius: 16px;
            }
            .top-bar {
                flex-direction: column;
                gap: 12px;
            }
            .tabs {
                width: 100%;
            }
            .fab-post {
                width: 100%;
                justify-content: center;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.18);
        }
    
    </style>
</head>
<body>
<div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <header class="header">
        <h1>六(1)班毕业交流区</h1>
        <p>记录同窗岁月，分享毕业心情，留住我们的六(1)班</p>
    </header>

    <div class="container">
        <div class="top-bar">
            <div class="tabs">
                <button class="tab active" data-tab="hot">
                    <span class="icon">🔥</span>热门
                </button>
                <button class="tab" data-tab="new">
                    <span class="icon">🆕</span>最新
                </button>
            </div>
            <button class="fab-post" onclick="openModal()">✨ 发布帖子</button>
        </div>

        <div class="posts-list" id="postsList">
            <div class="loading">正在加载帖子...</div>
        </div>
    </div>

    <!-- 发帖弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-title">发布帖子</div>
            <input type="text" class="modal-input" id="modalName" placeholder="你的名字" maxlength="20">
            <input type="text" class="modal-input" id="modalTitle" placeholder="标题" maxlength="50">
            <div class="image-input-row">
                <input type="text" class="image-input" id="modalImage" placeholder="图片链接（可选，粘贴图片URL）" maxlength="500">
            </div>
            <textarea class="modal-textarea" id="modalContent" placeholder="内容" maxlength="1000"></textarea>
            <button class="modal-submit" id="submitBtn" onclick="submitPost()">发布</button>
        </div>
    </div>

    <script>
        // ==================== JSONBlob 配置 ====================
        const BLOB_ID = '019f3b12-9210-7ba4-9309-97f989046683';
        const API_URL = 'https://api.jsonblob.com/' + BLOB_ID;

        // ==================== 数据 ====================
        let posts = [];
        let currentTab = 'hot';
        let likedPosts = JSON.parse(localStorage.getItem('likedPosts')) || {};
        let isLoading = false;

        // ==================== 从云端加载帖子 ====================
        async function loadPosts() {
            isLoading = true;
            try {
                const resp = await fetch(API_URL);
                if (resp.ok) {
                    const data = await resp.json();
                    posts = data.posts || [];
                    renderPosts();
                }
            } catch (err) {
                console.error('加载失败:', err);
                document.getElementById('postsList').innerHTML = '<div class="empty-state"><div class="emoji">⚠️</div><p>加载失败，请检查网络连接</p></div>';
            }
            isLoading = false;
        }

        // ==================== 保存帖子到云端 ====================
        async function savePosts() {
            try {
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ posts: posts })
                });
            } catch (err) {
                console.error('保存失败:', err);
            }
        }

        // ==================== 自动刷新（每1分钟同步一次） ====================
        setInterval(() => {
            if (!isLoading) loadPosts();
        }, 60000);

        // ==================== 模态框 ====================
        function openModal() {
            document.getElementById('modalOverlay').classList.add('show');
            setTimeout(() => {
                document.getElementById('modalName').focus();
            }, 100);
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            document.getElementById('modalName').value = '';
            document.getElementById('modalTitle').value = '';
            document.getElementById('modalContent').value = '';
            document.getElementById('modalImage').value = '';
        }

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // ==================== 发帖 ====================
        async function submitPost() {
            const name = document.getElementById('modalName').value.trim();
            const title = document.getElementById('modalTitle').value.trim();
            const content = document.getElementById('modalContent').value.trim();

            if (!name) {
                document.getElementById('modalName').focus();
                return;
            }

            if (name === '沈雄') {
                const postPwd = prompt('沈雄 身份验证：请输入发帖密码：');
                if (postPwd === null) return;
                if (postPwd !== 'polytrack114514') {
                    alert('发帖密码错误！');
                    return;
                }
            }

            if (!title && !content) {
                document.getElementById('modalTitle').focus();
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '发布中...';

            const newPost = {
                id: Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                title: title,
                content: content,
                author: name,
                avatar: getAvatar(name),
                time: Date.now(),
                likes: 0,
                comments: []
            };

            // 先读取最新数据，再写入（避免覆盖他人帖子）
            try {
                const resp = await fetch(API_URL);
                const data = await resp.json();
                const currentPosts = data.posts || [];
                currentPosts.unshift(newPost);
                posts = currentPosts;

                const saveResp = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ posts: posts })
                });

                if (saveResp.ok) {
                    closeModal();
                    currentTab = 'new';
                    updateTabs();
                    renderPosts();
                } else {
                    alert('发布失败，请重试');
                }
            } catch (err) {
                alert('发布失败: ' + err.message);
            }

            btn.disabled = false;
            btn.textContent = '发布';
        }

        // ==================== 点赞 ====================
        async function toggleLike(id) {
            const isLiked = likedPosts[id] || false;

            // 在本地找到帖子并修改
            const post = posts.find(p => p.id === id);
            if (post) {
                post.likes = isLiked ? Math.max(0, (post.likes || 0) - 1) : (post.likes || 0) + 1;
            }

            likedPosts[id] = !isLiked;
            localStorage.setItem('likedPosts', JSON.stringify(likedPosts));
            renderPosts();

            // 同步到云端
            savePosts();
        }

        // ==================== 渲染 ====================
        function renderPosts() {
            const list = document.getElementById('postsList');
            let displayPosts = [...posts];

            if (currentTab === 'hot') {
                displayPosts.sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    return (b.likes || 0) - (a.likes || 0);
                });
            } else {
                displayPosts.sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    return (b.time || 0) - (a.time || 0);
                });
            }

            if (displayPosts.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">🎓</div>
                        <p>还没有帖子，点击右上角做第一个留下毕业回忆的人吧</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = displayPosts.map(post => {
                const isLiked = likedPosts[post.id] || false;
                return `
                    <div class="post-card" data-id="${post.id}">
                        <div class="post-header">
                            <div class="post-author">
                                <div class="avatar">${post.avatar.startsWith('http') ? `<img src="${post.avatar}" alt="avatar">` : post.avatar}</div>
                                <div class="author-info">
                                    <span class="author-name">
                                        ${escapeHtml(post.author)}
                                        ${post.author === '沈雄' ? `
                                            <span class="badge badge-developer">开发者</span>
                                            <span class="badge badge-admin">管理者</span>
                                        ` : ''}
                                    </span>
                                    <span class="post-time">${formatTime(post.time)}</span>
                                </div>
                            </div>
                            <div style="display: flex; flex-shrink: 0; gap: 4px;">
                                <button class="pin-btn" onclick="togglePin('${post.id}')" title="置顶/取消置顶">${post.pinned ? '📌 取消置顶' : '📌 置顶'}</button>
                                <button class="delete-btn" onclick="deletePost('${post.id}')" title="删除帖子">🗑 删除</button>
                            </div>
                        </div>
                        ${post.title ? `<div class="post-title">${post.pinned ? '📌 ' : ''}${escapeHtml(post.title)}</div>` : ''}
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        <div class="post-footer">
                            <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                                <span>${isLiked ? '❤️' : '🤍'}</span>
                                <span>${post.likes || 0}</span>
                            </button>
                            <button class="comments-toggle-btn" onclick="toggleComments('${post.id}')">
                                <span>💬</span>
                                <span>${(post.comments && post.comments.length) || 0}</span>
                            </button>
                        </div>
                        <div class="comments-section" id="comments-${post.id}">
                            <div class="comments-list" id="comments-list-${post.id}">
                                ${(post.comments && post.comments.length > 0) ? post.comments.map(c => `
                                    <div class="comment-item">
                                        <div class="comment-avatar">🌟</div>
                                        <div class="comment-body">
                                            <div class="comment-author">${escapeHtml(c.author)}</div>
                                            <div class="comment-text">${escapeHtml(c.content)}</div>
                                            <div class="comment-time">${formatTime(c.time)}</div>
                                        </div>
                                        <button class="action-btn" style="color:#ff5555;font-size:12px;" onclick="deleteComment('${post.id}', '${c.id}')">🗑️</button>
                                    </div>
                                `).join('') : '<div style="color: var(--text-muted); font-size: 0.85rem; padding: 8px 0;">暂无评论，来做第一个评论的人吧</div>'}
                            </div>
                            <div class="comment-input-area">
                                <div class="comment-input-row">
                                    <input type="text" class="comment-input" id="comment-name-${post.id}" placeholder="你的名字" maxlength="20">
                                </div>
                                <textarea class="comment-textarea" id="comment-text-${post.id}" placeholder="写下你的评论..." maxlength="300"></textarea>
                                <button class="comment-submit" onclick="submitComment('${post.id}')">发送评论</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function togglePin(postId) {
            const password = prompt('请输入管理员密码：');
            if (password === null) return;
            if (password !== '1028') {
                alert('密码错误！');
                return;
            }
            const post = posts.find(p => String(p.id) === String(postId));
            if (post) {
                post.pinned = !post.pinned;
                await savePosts();
                renderPosts();
                alert(post.pinned ? '📌 已置顶' : '📌 已取消置顶');
            }
        }

        async function deletePost(postId) {
            const password = prompt('请输入删除密码:');
            if (password === null) return;
            if (password !== '1028') {
                alert('密码错误，无法删除！');
                return;
            }
            if (!confirm('确定要删除这条帖子吗？')) return;
            posts = posts.filter(p => String(p.id) !== String(postId));
            await savePosts();
            renderPosts();
            alert('🗑 帖子已删除');
        }

        // ==================== 评论功能 ====================
        function toggleComments(postId) {
            const section = document.getElementById('comments-' + postId);
            if (section) {
                section.classList.toggle('show');
            }
        }

        async function submitComment(postId) {
            const nameInput = document.getElementById('comment-name-' + postId);
            const textInput = document.getElementById('comment-text-' + postId);
            const name = nameInput.value.trim();
            const content = textInput.value.trim();

            if (!name) {
                nameInput.focus();
                return;
            }
            if (!content) {
                textInput.focus();
                return;
            }

            const post = posts.find(p => String(p.id) === String(postId));
            if (!post) return;

            if (!post.comments) post.comments = [];

            post.comments.push({
                id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                author: name,
                content: content,
                time: Date.now()
            });

            nameInput.value = '';
            textInput.value = '';

            await savePosts();
            renderPosts();

            // 重新展开评论区
            setTimeout(() => {
                const section = document.getElementById('comments-' + postId);
                if (section) section.classList.add('show');
            }, 50);
        }

        async function deleteComment(postId, commentId) {
            const pwd = prompt('请输入删除密码：');
            if (pwd !== '1028') {
                alert('密码错误');
                return;
            }
            const post = posts.find(p => String(p.id) === String(postId));
            if (!post || !post.comments) return;
            post.comments = post.comments.filter(c => String(c.id) !== String(commentId));
            await savePosts();
            renderPosts();
            setTimeout(() => {
                const section = document.getElementById('comments-' + postId);
                if (section) section.classList.add('show');
            }, 50);
        }

        // ==================== 工具函数 ====================
        function formatTime(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const minute = 60 * 1000;
            const hour = 60 * minute;
            const day = 24 * hour;

            if (diff < minute) return '刚刚';
            if (diff < hour) return Math.floor(diff / minute) + '分钟前';
            if (diff < day) return Math.floor(diff / hour) + '小时前';
            if (diff < 7 * day) return Math.floor(diff / day) + '天前';
            return new Date(timestamp).toLocaleDateString('zh-CN');
        }

        function getAvatar(name) {
            if (name === '沈雄') {
                return 'https://i.imglt.com/20260705/bd01211953488764f07ea3f000b353d0.jpg';
            }
            return '🌟';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.tab === currentTab);
            });
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                currentTab = tab.dataset.tab;
                updateTabs();
                renderPosts();
            });
        });

        // ==================== 自动心跳（每12小时访问一次，防止JSONBlob 3天过期） ====================
        function heartbeat() {
            fetch(API_URL, { method: 'HEAD' }).catch(() => {});
        }
        // 页面加载时执行一次，然后每12小时执行一次
        heartbeat();
        setInterval(heartbeat, 12 * 60 * 60 * 1000);

        // ==================== 初始化 ====================
        loadPosts();
    
    

</script>
</body>
</html>
